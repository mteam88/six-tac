name = "six-tac"
main = "src/worker.ts"
compatibility_date = "2026-04-02"
workers_dev = true

[observability.logs]
enabled = true
invocation_logs = true

[[routes]]
pattern = "6-tac.com"
custom_domain = true

[assets]
directory = "./public"
binding = "ASSETS"
run_worker_first = ["/api/*"]

[[durable_objects.bindings]]
name = "SESSIONS"
class_name = "SessionObject"

[[durable_objects.bindings]]
name = "MATCHMAKER"
class_name = "MatchmakerObject"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RoomObject"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["SessionObject", "MatchmakerObject"]
