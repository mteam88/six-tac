"$schema" = "./node_modules/wrangler/config-schema.json"
name = "six-tac"
main = "src/worker.ts"
compatibility_date = "2026-04-02"
workers_dev = true

[observability]
enabled = true

  [observability.logs]
  enabled = true
  invocation_logs = true
  head_sampling_rate = 1

[[routes]]
pattern = "6-tac.com"
custom_domain = true

[assets]
directory = "./public"
binding = "ASSETS"
run_worker_first = ["/api/*"]

[[durable_objects.bindings]]
name = "SESSIONS"
class_name = "SessionRuntime"

[[durable_objects.bindings]]
name = "COMPUTE_JOBS"
class_name = "ComputeJobRuntime"

[[queues.producers]]
queue = "best-move-jobs-v1"
binding = "BEST_MOVE_JOBS_QUEUE"

[[queues.producers]]
queue = "eval-jobs-v1"
binding = "EVAL_JOBS_QUEUE"

[[queues.consumers]]
queue = "best-move-jobs-v1"
max_batch_size = 4
max_batch_timeout = 1
max_retries = 8
retry_delay = 5
max_concurrency = 8
dead_letter_queue = "best-move-jobs-dlq-v1"

[[queues.consumers]]
queue = "eval-jobs-v1"
max_batch_size = 4
max_batch_timeout = 1
max_retries = 4
retry_delay = 5
max_concurrency = 4
dead_letter_queue = "eval-jobs-dlq-v1"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RoomObject"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["SessionObject", "MatchmakerObject"]

[[migrations]]
tag = "v3"
new_sqlite_classes = ["KrakenContainer"]

[[migrations]]
tag = "v4"
deleted_classes = ["KrakenContainer"]

[[migrations]]
tag = "v5"
new_sqlite_classes = ["SessionRuntime", "MatchmakerRuntime"]

[[migrations]]
tag = "v6"
deleted_classes = ["RoomObject", "SessionObject", "MatchmakerObject"]

[[migrations]]
tag = "v7"
new_sqlite_classes = ["ComputeJobRuntime"]
deleted_classes = ["MatchmakerRuntime"]

[vars]
KRAKEN_MODEL_VERSION = "kraken_v1"
KRAKEN_MOVE_TIMEOUT_MS = "30000"
